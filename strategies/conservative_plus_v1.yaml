# Aristos Council — RANK strategy: Conservative Formula+ (v1)
# =========================================================
# van Vliet & Blitz Conservative Formula: rank on LOW VOLATILITY, NET PAYOUT YIELD,
# and 12-MONTH MOMENTUM, combine the ranks, take the top. In Schwartz & Hanauer
# (2024) the Conservative Formula LED risk-adjusted performance with the lowest
# drawdown.
#
# This is the NVO-PROOF strategy: by including momentum AND low-vol, it STRUCTURALLY
# avoids falling knives. A crashing name (NVO: ~-25% on the year, elevated vol) ranks
# badly on BOTH the momentum and low-vol legs and never reaches the BUY quintile — no
# tuned weight required, the ranking does it (the NVO fix as a property of the method,
# proven in test_conservative_plus).

id: conservative_plus_v1
name: Conservative Formula+ (rank-based)
display_name: Defensive Income (Conservative Formula+)
version: 1

description: >
  Low-risk, income, and trend — the best risk-adjusted of the classic formulas.
  Ranks the universe on low volatility, net payout yield, and 12-month momentum, and
  combines the ranks. Momentum + low-vol exclude actively-declining names by
  construction.

# Suggested universes (UNI-1): surfaced first in the selectors; a hierarchy, never a
# lock — cross-lens runs stay one-click. This defensive-income lens pairs with the
# defensive-income scoreboard universe.
suggested_universes:
  - defensive_income_16_v1

# Asset-kind scope (ETF-1 ITEM 2): a stock lens admits ONLY equities. An ETF/fund
# leaking in would be ranked on the vendor's look-through "fundamentals" (quiet
# garbage), so the confirmed-only kind gate walls it out before any factor path.
asset_kinds:
  - equity
asset_kind_rationale: >-
  Net payout yield and the defensive screen describe an operating company, not a
  fund; an ETF scored on look-through vendor fundamentals is quiet garbage, so it is
  gated out.
factors:
  - name: low_volatility      # lower realized vol ranks better (direction from registry)
  - name: net_payout_yield    # dividends (+ buybacks where available); div-yield fallback
    missing: neutral          # buyback-only / non-dividend names (AMZN/ADBE/NVDA) have
                              # NO free-data payout figure — judge them on low-vol +
                              # momentum, do NOT dump them to worst rank for the gap.
  - name: momentum_12m        # 12-month trailing return; higher ranks better

cut: quintile
k: 6
percentile: 0.2
# The council judges a pick as a DEFENSIVE candidate (same philosophy), not against
# the GARP growth screen — otherwise every stable compounder "fails revenue CAGR".
council_screen_strategy: conservative_screen_v1
# A missing factor sits at the worst rank rather than excluding the name — a
# non-payer or short-history name is penalised, not dropped.
missing: worst

min_market_cap: 1000000000
# SCREEN-AS-PREFILTER: rank ONLY names that pass conservative_screen_v1's floors
# (real income >=1.5% yield, covered payout <=85%, large-cap, momentum not broken).
# ONE definition of "defensive" shared with the council — the ranker orders names
# already known to qualify, instead of ranking-and-combining letting a name strong on
# 2 factors through despite failing a hard floor on the 3rd. This SUBSUMES the
# standalone payout gate (the screen supplies max_payout_ratio = 0.85).
prefilter_screen: true

rationale: >
  Defensive equity returns are driven more by what you AVOID than what you pick:
  high-volatility, momentum-losing names destroy compounding. Ranking on low-vol +
  momentum + payout captures that without a single tuned weight, and structurally
  screens out the cheap-but-falling trap that pure trailing-value scoring walks into.
