# Growth ETFs (rank-based, no screens — house doctrine) — ETF-1 ITEM 3.
# ====================================================================
# HONESTY NOTE (verbatim, ETF-1 ITEM 3): a growth ETF's real quality is its index
# methodology, which no vendor field captures — this lens compares costs, size and trend
# among self-declared growth funds, nothing more.
#
# Rank a universe of growth-oriented ETFs on cost, trend, and size; combine the ranks; no
# screens, no floors. EXPLORATORY: never on the prospective scoreboard until deliberately
# frozen. All-US-first (FIN-1 precedent: currency-clean and vendor-rich first).
id: etf_growth_v1
name: Growth ETFs
display_name: Growth ETFs
version: 1

description: >-
  Rank growth-oriented ETFs on expense ratio (cost, ranked low), 12-month momentum
  (trend), and fund size (liquidity + closure risk). Rank-first, no screens; abstention
  on a missing field never excludes a fund.

# The honesty note is carried VERBATIM here so it travels with every render of the lens.
rationale: >-
  a growth ETF's real quality is its index methodology, which no vendor field captures —
  this lens compares costs, size and trend among self-declared growth funds, nothing
  more. Exploratory, all-US-first by design (FIN-1 precedent): US-listed funds are
  currency-clean and vendor-rich (ITEM-1 probe: 100% coverage). UCITS/European lines
  join as a later versioned universe once the coverage probe has field history.

# Asset-kind scope (ETF-1 ITEM 2): this lens admits ONLY ETFs. An equity leaking in
# would be ranked on the wrong footing, so the confirmed-only kind gate walls it out
# before any factor path.
asset_kinds:
  - etf
asset_kind_rationale: >-
  Expense ratio and fund size are fund attributes; an operating company has none of
  them, so a non-ETF is gated out of this lens.

# Suggested universes (UNI-1): the ITEM-4 all-US growth-ETF list, plus the euro-
# investable UCITS cohort (UCITS-1, observation only). Both are selectable; the all-US
# list stays first (currency-clean, vendor-rich).
suggested_universes:
  - etf_growth_us_v1
  - etf_growth_ucits_v1

factors:
  - name: expense_ratio        # cost    — LOWER ranks better (compounds against holder)
  - name: momentum_12m         # trend   — higher ranks better
  - name: fund_size            # size    — higher ranks better (liquidity, closure risk)

cut: quintile
missing: neutral               # abstention on a missing field: judge on what's present,
                               # never exclude (house doctrine — no screens, no floors)
