# Greenblatt Magic Formula (rank-based, no weights).
# Rank the universe on QUALITY (ROIC) + VALUE (earnings yield); combine ranks;
# the best-combined-rank names are the BUYs. The validated baseline — smallest
# migration from the old screen (ROIC + value already in the registry).
id: magic_formula_v1
name: Magic Formula
display_name: Classic Value (baseline — for comparison)
ui: hidden          # legacy/superseded — not listed in the dropdowns; still CLI-loadable
version: 1
description: >-
  Greenblatt's two-factor rank: return on invested capital (quality) + earnings
  yield (value). Rank each, combine the ranks, quintile cut. No point weights —
  the ranking is the decision.
rationale: >-
  Highest factor-adjusted alpha of the four formulas in the 2024 Schwartz & Hanauer
  study; decades of out-of-sample validation across multiple markets.
# Asset-kind scope (ETF-1 ITEM 2): a stock lens admits ONLY equities. An ETF/fund
# leaking in would be ranked on the vendor's look-through "fundamentals" (quiet
# garbage), so the confirmed-only kind gate walls it out before any factor path.
asset_kinds:
  - equity
asset_kind_rationale: >-
  EBIT/EV and ROIC describe an operating company's economics, not a fund's; an ETF
  scored on look-through vendor fundamentals is quiet garbage, so it is gated out.
factors:
  - name: roic            # quality  (registry direction: high)
  - name: earnings_yield  # value    (registry direction: high)
cut: quintile             # top 20% BUY, middle 60% HOLD, bottom 20% SELL
missing: worst            # a NOT-EVAL factor keeps the name at worst rank
min_market_cap: 5.0e9     # Greenblatt-style floor: exclude thin micro-caps
# Greenblatt EXCLUDES financials and utilities: ROIC / invested-capital is a
# meaningless artifact on a bank's balance sheet (GS/JPM read as worst-ROIC). Cover
# the common yfinance/EODHD sector labels (case-insensitive match).
exclude_sectors:
  - Financial Services      # yfinance label
  - Financials              # EODHD / GICS label
  - Utilities
sector_exclusion_rationale: >-
  EBIT/EV and ROIC are not computable on a comparable basis for financials
  (Greenblatt exclusion). Note the factor block: roic abstains,
  earnings_yield falls back to P/E.
# Council judges a pick as a QUALITY-VALUE candidate (ROIC + valuation sanity), not
# against the GARP growth screen.
council_screen_strategy: magic_value_screen_v1
# Screen-as-prefilter: rank ONLY names passing magic_value_screen_v1's ABSOLUTE
# floors (min_roic 12%). Rank-relative ROIC let BMY (10.6%) into the BUY quintile
# below the lens's own floor — the same rank-vs-floor mismatch fixed for
# conservative_plus. One definition of "quality-value" for ranker and council.
prefilter_screen: true
