# Aristos Council — Investment Strategy Config
# =============================================
# Strategy: Dividend Aristocrats (v1)
#
# This file is the SINGLE source of policy for the dividend-aristocrat screen.
# Deterministic tools hold no thresholds of their own; they receive these
# values at call time. Changing strategy = editing/adding a versioned YAML,
# never editing tool code. Bump the version (new file, e.g. _v2) rather than
# mutating a published strategy, so historical decisions remain reproducible.
#
# The prose `rationale` and `notes` fields are also indexed into the RAG store
# as strategy docs, so the specialists can ground their reasoning in the stated
# philosophy — not just the raw numbers.

id: dividend_aristocrats_v1
name: Dividend Aristocrats
version: 1

description: >
  Conservative income strategy targeting large, financially durable companies
  with a long, unbroken record of growing dividends. Prioritises sustainability
  of the payout over headline yield. Modelled on the spirit of the S&P 500
  Dividend Aristocrats index, adapted for single-name research rather than index
  membership.

# --- Screening thresholds (consumed by tools/screening.py) ---
# All ratios are decimals: 0.025 == 2.5%.
criteria:
  min_dividend_yield: 0.025        # floor; avoids near-zero-yield names
  max_payout_ratio: 0.75           # ceiling; >0.75 questions sustainability
  min_market_cap: 10000000000      # 10B USD; large-cap durability proxy
  min_dividend_growth_years: 25    # canonical aristocrat streak

# --- How conflicts and edge cases are intended to be handled ---
# These are read by the human-gate / decision logic and surfaced in RAG so the
# reasoning is consistent and auditable.
policy:
  # When the growth-streak criterion is UNVERIFIABLE on the current provider
  # (yfinance can't confirm 25y), do NOT auto-pass. Force a data-quality flag.
  unverifiable_streak_is_blocking: true
  # A name failing on yield alone but strong elsewhere may still warrant a HOLD
  # discussion rather than an outright SELL — left to the council, not the screen.
  partial_pass_allows_hold: true

# --- Human-veto gate thresholds (consumed by agents/veto.py) ---
veto:
  min_confidence: 0.6   # decisions below this confidence pause for human review

rationale: >
  The aristocrat thesis is that a multi-decade record of rising dividends is a
  hard-to-fake signal of disciplined capital allocation and earnings durability.
  Yield is necessary but not sufficient: a high yield paired with a stretched
  payout ratio is a warning, not an attraction. The screen therefore weights
  payout sustainability and the growth streak above raw yield.

notes: >
  v1 limitation: the 25-year streak cannot be fully verified on the yfinance
  development provider, which supplies only a short dividend history. Until EODHD
  (longer history) is wired in, the streak criterion will frequently return
  UNVERIFIABLE and trigger the data-quality veto gate by design. This is correct
  behaviour — the council should refuse to assert an aristocrat streak it cannot
  evidence.
