# Growth screen — the council LENS for growth_garp_v1 (Sprint 4C).
# ================================================================
# The growth/quality screen a GARP rank pick is judged and prefiltered against: durable
# revenue growth, capital efficiency (ROIC), growth at a reasonable price (PEG), a
# mid/large-cap floor, and a non-gating momentum floor (screens out falling knives).
# Mirrors the growth_v1 single-ticker screen's criteria; kept as a separate LENS so the
# rank strategy references a screen (like magic_value_screen_v1) without touching the
# frozen growth_v1 config.
id: growth_screen_v1
name: Growth screen
version: 1

description: >-
  Capital-efficient growth (revenue CAGR + ROIC) bought at a reasonable price (PEG),
  scoped to mid/large caps, with a non-gating 12m-momentum floor — the screen lens for a
  Growth-at-a-Reasonable-Price rank candidate.

criteria:
  - name: min_revenue_cagr          # durable top-line growth (in-house 3y CAGR)
    threshold: 0.10
  - name: min_roic                  # capital efficiency / quality gate
    threshold: 0.12
  - name: max_peg_ratio             # growth at a reasonable price
    threshold: 2.0
  - name: min_market_cap            # 5B USD; mid/large-cap scope
    threshold: 5000000000
  - name: min_price_momentum        # value+momentum: screen out falling knives (NON-GATING)
    threshold: 0.0

policy:
  partial_pass_allows_hold: true

veto:
  min_confidence: 0.6

rationale: >-
  Great businesses compound revenue at high incremental returns on capital; the
  discipline is refusing to overpay for it. Revenue CAGR evidences the compounding, ROIC
  that the growth creates value, and PEG keeps valuation honest — the momentum floor only
  screens sustained downtrends, it does not hard-veto a dip.
