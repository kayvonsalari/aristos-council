rationale: >-
  Euro-investable UCITS cohort — the deferred European counterpart to etf_dividend_us_v1.
  Slow fields are static-layer/EODHD-sourced (ETF-STATIC-1), so a run replays them
  byte-identically. Every name here is a DIST (distributing) share class, which is what a
  dividend lens should rank; the dividend cohort's v2 should continue to prefer DIST share
  classes so the distribution-yield factor reflects a real income stream rather than an
  accumulating fund's structural zero.
