# etf_growth_ucits_v1 — euro-investable UCITS growth-ETF universe (UCITS-1).
# ==========================================================================
# The 6 UCITS-domiciled, euro-investable growth-oriented ETFs the etf_growth_v1 lens ranks
# over. Deferred from the all-US v1 (FIN-1 precedent) until the slow ETF fields had a
# source: they now arrive from the committed static layer (ETF-STATIC-1), EODHD
# fundamentals-API-sourced and dated. OBSERVATION ONLY — never graded on a scoreboard.
#
# Most names here are ACC (accumulating) share classes, so their distribution yield is a
