# Council Station theme — institutional, restrained (Bloomberg-terminal register).
# Dark base, off-white text, a single muted-gold accent. No gradients. The only
# OTHER colors in the app are the three semantic verdict colors (BUY/HOLD/SELL),
# applied in code — never decoratively.

[theme]
base = "light"
backgroundColor = "#0E1117"          # app background
secondaryBackgroundColor = "#1A1F2B" # cards, sidebar, expanders
textColor = "#E8E6E3"                # off-white
primaryColor = "#C9A227"             # muted gold — the single accent
font = "serif"                       # classical, institutional

[client]
# "viewer" keeps user controls — the sidebar collapse/expand toggle and the
# Settings menu (incl. the theme switch) — while hiding developer affordances
# (Deploy, Rerun, Clear cache). "minimal" hid the sidebar toggle and theme
# switch, so it is NOT used.
toolbarMode = "viewer"

[browser]
gatherUsageStats = false
