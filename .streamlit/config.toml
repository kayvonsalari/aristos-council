# Council Station theme — institutional, restrained (Bloomberg-terminal register).
# Dark base, off-white text, a single muted-gold accent. No gradients. The only
# OTHER colors in the app are the three semantic verdict colors (BUY/HOLD/SELL),
# applied in code — never decoratively.

[theme]
base = "light"
backgroundColor = "#0E1117"          # app background
secondaryBackgroundColor = "#1A1F2B" # cards, sidebar, expanders
textColor = "#E8E6E3"                # off-white
primaryColor = "#C9A227"             # muted gold — the single accent
font = "serif"                       # classical, institutional

[client]
# toolbarMode gates the top-right ⋮ menu SERVER-SIDE (no CSS can restore it):
#   "viewer"/"minimal" -> the toolbar menu is hidden entirely (this was the bug:
#     "viewer" does NOT keep a Settings menu, contrary to the old note here).
#   "auto" (default)   -> shows the full menu (Settings/theme included) on
#     localhost / for the developer; hides dev options for deployed viewers.
#   "developer"        -> always shows the full menu.
# We run locally, so "auto" makes the ⋮ menu (and its theme switch) reachable.
toolbarMode = "auto"

[browser]
gatherUsageStats = false
