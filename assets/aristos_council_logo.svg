<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 64 64" fill="#C9A227" role="img" aria-label="Aristos Council">
  <!-- Classical temple facade: pediment, architrave, columns, stylobate.
       Single flat color (the gold accent); scales cleanly 32px–200px. -->
  <!-- pediment -->
  <path d="M32 5 L59 21 L5 21 Z"/>
  <!-- architrave -->
  <rect x="6" y="23" width="52" height="5"/>
  <!-- capitals -->
  <rect x="9"  y="29" width="7" height="2"/>
  <rect x="19" y="29" width="7" height="2"/>
  <rect x="29" y="29" width="7" height="2"/>
  <rect x="39" y="29" width="7" height="2"/>
  <rect x="49" y="29" width="7" height="2"/>
  <!-- columns -->
  <rect x="10" y="32" width="5" height="20"/>
  <rect x="20" y="32" width="5" height="20"/>
  <rect x="30" y="32" width="5" height="20"/>
  <rect x="40" y="32" width="5" height="20"/>
  <rect x="50" y="32" width="5" height="20"/>
  <!-- stylobate (two steps) -->
  <rect x="6" y="53" width="52" height="3"/>
  <rect x="3" y="57" width="58" height="4"/>
</svg>
