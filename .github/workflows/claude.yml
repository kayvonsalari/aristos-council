name: Claude

# Cloud agent that works issues and PR comments mentioning @claude.
# Prerequisites (one-time, repo admin — see the setup notes in the PR/commit that added
# this file):
#   1. Install the Claude GitHub App on this repo: https://github.com/apps/claude
#   2. Add a repository secret ANTHROPIC_API_KEY (Settings → Secrets and variables →
#      Actions), value from https://console.anthropic.com
# Until both exist, this workflow triggers but the job fails at auth — harmless.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

# Only spin up a run when @claude is actually mentioned (cost control): the action also
# guards internally, but this stops the runner from starting on unrelated comments.
jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write        # secure token exchange used by the action
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history so the agent can inspect/branch cleanly

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
